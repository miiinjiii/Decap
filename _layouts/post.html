---
layout: default
---

<article>
  <div class="post-hero">
    <h1>{{ page.title }}</h1>

    <div class="post-meta">
      {{ page.date | date: "%B %d, %Y" }}
      {% if page.category %}
        • {{ page.category }}
      {% endif %}
    </div>
  </div>

  {% if page.image %}
    <img src="{{ page.image }}" alt="{{ page.title }}">
  {% endif %}

  <div class="post-content">
    {{ content }}
  </div>
</article>
